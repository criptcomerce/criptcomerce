version: '3.8'

services:
  # ─── Banco de dados ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crypto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cryptouser}
      POSTGRES_PASSWORD: ${DB_PASS:-cryptopass}
      POSTGRES_DB: ${DB_NAME:-crypto_payments}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cryptouser} -d ${DB_NAME:-crypto_payments}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-cryptouser}:${DB_PASS:-cryptopass}@postgres:5432/${DB_NAME:-crypto_payments}
    depends_on:
      postgres:
        condition: service_healthy   # ← só sobe após o postgres estar pronto
    volumes:
      - ./logs:/app/logs             # persiste logs fora do container

volumes:
  postgres_data:
